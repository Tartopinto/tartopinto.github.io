  name    : "Giordano Fausti"
  avatar  : "/assets/images/bio-photo.jpg"
  bio     : "Simulation Intelligence & Computational Physics Researcher. Focused on physical simulations, SciML, Active Matter, and HPC."
  location: "Brescia, Italy"
  links:
