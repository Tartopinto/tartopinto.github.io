# Welcome to Jekyll!
# Site settings
title: 
email: fausti.giordano@gmail.com
description: >- 
  Computational physicist with 5+ years of experience in large-scale simulations, 
  active matter systems, and High-Performance Computing. Currently pivoting 
  towards Scientific Machine Learning (SciML).
twitter_username: 
github_username: tartopinto
minimal_mistakes_skin: air # Puoi provare "air", "aqua", "contrast", "dirt", "neon", "sunrise"
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 
paginate_path: /page:num/
timezone: Europe/Rome

include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Author Settings
